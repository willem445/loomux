[package]
name = "loomux"
version = "0.2.0"
description = "A sleek terminal multiplexer for AI agent management"
edition = "2021"

[lib]
name = "loomux_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
portable-pty = "0.9"
base64 = "0.22"
dirs = "6"
# Orchestration backend: local MCP server (thread-per-request HTTP).
# NOTE: keep getrandom-based crates (uuid v4, rand) out of this tree — they
# import bcryptprimitives.dll!ProcessPrng, which this project's Windows 10
# baseline doesn't export, and the binary then fails to load (0xc0000139).
# Agent tokens use std's OS-seeded RandomState instead.
tiny_http = "0.12"
tauri-plugin-dialog = "2"
sysinfo = "0.33"

# Vendor-neutral GPU metrics on Windows: PDH performance counters give
# per-engine utilization + dedicated VRAM usage for any WDDM adapter (AMD,
# Intel, NVIDIA); DXGI reports total VRAM and the adapter name.
[target.'cfg(windows)'.dependencies]
# Fresh PATH resolution from the registry, so CLIs installed while loomux
# (or its parent terminal) is already running are still found by new panes
# and probes. Pure windows-sys underneath — no getrandom (see note above).
winreg = "0.55"
windows = { version = "0.57", features = [
    "Win32_Foundation",
    "Win32_System_Performance",
    "Win32_Graphics_Dxgi",
    "Win32_Graphics_Dxgi_Common",
] }

[dev-dependencies]
# default-features = false drops tempfile's getrandom feature — see the
# ProcessPrng note above; with it enabled the test binary fails to load.
tempfile = { version = "3", default-features = false }

[profile.release]
lto = true
codegen-units = 1
strip = true
