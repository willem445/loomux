[package]
name = "weft"
version = "0.1.0"
description = "A sleek terminal multiplexer for AI agent management"
edition = "2021"

[lib]
name = "weft_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
portable-pty = "0.9"
base64 = "0.22"
dirs = "6"

[profile.release]
lto = true
codegen-units = 1
strip = true
