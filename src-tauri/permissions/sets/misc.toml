[[set]]
identifier = "misc"
description = "Ungrouped single-module commands: session listing, agent CLI probing, external editor launch, file hashing, startup notice, durable UI tab state, voice capture, opening/closing a plugin's isolated child webview."
permissions = [
    "allow-list-sessions",
    "allow-probe-agent-cli",
    "allow-open-in-editor",
    "allow-fm-hash-start",
    "allow-take-startup-notice",
    "allow-load-ui-tabs",
    "allow-save-ui-tabs",
    "allow-voice-start",
    "allow-voice-stop",
    "allow-voice-cancel",
    # main-only (#360 Slice C/D): opens/closes a plugin's isolated child
    # webview (Window::add_child). Never granted to a plugin-* webview itself
    # — see permissions/sets/plugin-broker.toml.
    "allow-plugin-open-window",
    "allow-plugin-close-window",
    # main-only (#391, folded into #380): clips the plugin child webview's own
    # HWND to exclude whatever DOM overlay rects currently cover its pane.
    # Never granted to a plugin-* webview itself.
    "allow-plugin-set-occlusion",
]
