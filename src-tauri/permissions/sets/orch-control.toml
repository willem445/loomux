[[set]]
identifier = "orch-control"
description = "Mutating orchestration operations: create/bind/steer/approve/grant-merge/grant-release, task and channel management, autonomy settings, group lifecycle, solo mode."
permissions = [
    "allow-create-orchestration",
    "allow-bind-agent",
    "allow-orch-agent-renamed",
    "allow-resume-orch-session",
    "allow-orch-steer",
    "allow-orch-save-attachment",
    "allow-orch-upsert-task",
    "allow-orch-delete-task",
    "allow-orch-delete-done-tasks",
    "allow-orch-delete-tasks",
    "allow-orch-reorder-tasks",
    "allow-orch-open-ref",
    "allow-orch-approve-task",
    "allow-orch-grant-merge",
    "allow-orch-grant-release",
    "allow-orch-request-changes",
    "allow-orch-start-task",
    "allow-orch-proceed-task",
    "allow-orch-pause-group",
    "allow-orch-resume-group",
    "allow-orch-ack-attention",
    "allow-orch-ack-attention-pty",
    "allow-orch-set-notify",
    "allow-orch-set-spawn-expanded",
    "allow-orch-set-max-agents",
    "allow-orch-set-autonomous",
    "allow-orch-set-auto-merge",
    "allow-orch-set-auto-release",
    "allow-orch-set-dangerous-mode",
    "allow-orch-set-autonomy-budget",
    "allow-orch-set-idle-tick-minutes",
    "allow-orch-set-idle-activity-floor",
    "allow-orch-end-group",
    "allow-orch-channel-connect",
    "allow-orch-channel-disconnect",
    "allow-orch-channel-set-sender",
    "allow-orch-solo-prepare",
    "allow-orch-solo-bind",
    "allow-orch-solo-adopt",
]
