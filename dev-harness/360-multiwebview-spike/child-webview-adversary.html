<!doctype html>
<!--
  #360 multiwebview-embedding spike — throwaway, does not ship. Loaded as the
  TOP-LEVEL document of a child `Webview` added via `Window::add_child` (Tauri
  v2's `unstable` multiwebview API), embedded inside the `main` window rather
  than opened as its own top-level OS window.

  The question: does `capabilities/default.json`'s existing "windows": ["main"]
  grant (unmodified — this is the REAL shipped grant, not a spike-only edit)
  leak to this child webview purely because it lives inside the "main" window,
  even though its own webview label ("spike-child") is not "main" and was
  never itself granted anything? `pty_backend_info` is a real, already-shipped,
  already-granted-to-main command — a clean, unmodified control.
-->
<html>
<head><title>multiwebview spike: child webview</title></head>
<body>
<script>
(async function () {
  const results = [];
  function log(route, outcome, detail) {
    results.push({ route, outcome, detail: detail === undefined ? "" : String(detail) });
  }
  log("has-tauri-internals", typeof window.__TAURI_INTERNALS__ !== "undefined" ? "present" : "MISSING");
  try {
    const r = await window.__TAURI_INTERNALS__.invoke("pty_backend_info", {});
    log("invoke(pty_backend_info)", "SUCCEEDED-i.e.-WINDOWS-GRANT-LEAKED-TO-CHILD-WEBVIEW", JSON.stringify(r));
  } catch (e) {
    log("invoke(pty_backend_info)", "denied", e && e.message ? e.message : String(e));
  }
  log("window.opener", window.opener ? "unexpected-present" : "absent-as-expected", String(window.opener));
  window.__spikeResults__ = results;
})();
</script>
</body>
</html>
