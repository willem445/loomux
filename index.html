<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loomux</title>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div id="brand" title="Loomux — terminal multiplexer for AI agents">
          <span class="brand-mark">▤</span> loomux
        </div>
        <div id="actions">
          <button id="btn-sessions" class="bar-btn" title="Session browser (Ctrl+Shift+P)">⟲ sessions</button>
          <button id="btn-split-right" class="bar-btn" title="Split right (Ctrl+Shift+E)">◫</button>
          <button id="btn-split-down" class="bar-btn" title="Split down (Ctrl+Shift+O)">⬓</button>
        </div>
      </header>
      <div id="workspace">
        <aside id="sessions" class="hidden"></aside>
        <main id="grid-root"></main>
      </div>
      <footer id="hintbar">
        <span><kbd>Ctrl+Shift+E</kbd> split right</span>
        <span><kbd>Ctrl+Shift+O</kbd> split down</span>
        <span><kbd>Ctrl+Shift+W</kbd> close pane</span>
        <span><kbd>Ctrl+Shift+P</kbd> sessions</span>
        <span><kbd>F2</kbd> rename</span>
        <span><kbd>Alt+←↑↓→</kbd> focus</span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
