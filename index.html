<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loomux</title>
    <style>
      /* Critical pre-bundle styles: the real stylesheet arrives with the JS
         module, so without these the static markup flashes unstyled (white
         background, raw text) at startup. Paint dark immediately and keep
         the UI skeleton hidden; styles.css sets `#app { display: flex }`,
         which overrides the hide once it loads. */
      html, body { margin: 0; height: 100%; background: #131318; }
      #app { display: none; }
    </style>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div id="brand" title="Loomux — terminal multiplexer for AI agents">
          <span class="brand-mark">▤</span> loomux
        </div>
        <div id="actions">
          <button id="btn-agent-mode" class="bar-btn" title="Agent mode — new panes launch a coding agent (Ctrl+Shift+A)">✦ agents</button>
          <button id="btn-sessions" class="bar-btn" title="Session browser (Ctrl+Shift+P)">⟲ sessions</button>
          <button id="btn-split-right" class="bar-btn" title="Split right (Ctrl+Shift+E)">◫</button>
          <button id="btn-split-down" class="bar-btn" title="Split down (Ctrl+Shift+O)">⬓</button>
        </div>
      </header>
      <div id="workspace">
        <aside id="sessions" class="hidden"></aside>
        <main id="grid-root"></main>
      </div>
      <footer id="hintbar">
        <span><kbd>Ctrl+Shift+E</kbd> split right</span>
        <span><kbd>Ctrl+Shift+O</kbd> split down</span>
        <span><kbd>Ctrl+Shift+W</kbd> close pane</span>
        <span><kbd>Ctrl+Shift+P</kbd> sessions</span>
        <span><kbd>Ctrl+Shift+A</kbd> agent mode</span>
        <span><kbd>Alt+G</kbd> git</span>
        <span><kbd>F2</kbd> rename</span>
        <span><kbd>Alt+←↑↓→</kbd> focus</span>
      </footer>
      <footer id="statusbar" title="Live system resources">
        <div class="metric" id="m-cpu" title="CPU utilization">
          <span class="metric-label">CPU</span>
          <div class="metric-bar"><div class="metric-fill"></div></div>
          <span class="metric-val">–</span>
        </div>
        <div class="metric" id="m-mem" title="Memory in use">
          <span class="metric-label">MEM</span>
          <div class="metric-bar"><div class="metric-fill"></div></div>
          <span class="metric-val">–</span>
        </div>
        <div class="metric" id="m-gpu" title="GPU utilization">
          <span class="metric-label">GPU</span>
          <div class="metric-bar"><div class="metric-fill"></div></div>
          <span class="metric-val">–</span>
        </div>
        <div class="metric" id="m-vram" title="GPU VRAM in use">
          <span class="metric-label">VRAM</span>
          <div class="metric-bar"><div class="metric-fill"></div></div>
          <span class="metric-val">–</span>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
