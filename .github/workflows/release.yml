name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
            targets: aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: --target x86_64-apple-darwin
            targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            targets: ""
          - platform: windows-latest
            args: ""
            targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.args }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Loomux ${{ github.ref_name }}"
          releaseBody: |
            Download the asset for your platform below.

            - **Windows**: `*-setup.exe` (installer) or `*.msi`
            - **macOS**: `*_aarch64.dmg` (Apple Silicon) or `*_x64.dmg` (Intel) — unsigned; if macOS reports the app as damaged, run `xattr -cr /Applications/Loomux.app`
            - **Linux**: `*.AppImage` (portable), `*.deb`, or `*.rpm`

            Or use the one-liner installers in the README.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Publish the tiny npm launcher (`npx loomux-desktop`). It just downloads
  # the release asset built above, but must wait for `build` to finish and
  # upload the installers first — otherwise it can publish a launcher that
  # points at assets that never appear, or (if `build` is cancelled/retried)
  # collide with a later publish of the same version (#221).
  # Auth is npm "trusted publishing" (OIDC): the job mints an id-token that
  # npm exchanges for publish rights — no NPM_TOKEN secret involved. Requires
  # npm >= 11.5.1 (Node 22 bundles an older one, hence the upgrade step).
  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for trusted publishing
        # ^11, not @latest: needs >= 11.5.1 for OIDC trusted publishing, and
        # npm 12.0.0 shipped without its sigstore bundle, breaking provenance
        # publish with MODULE_NOT_FOUND (v0.7.1 failed twice; upstream
        # npm/cli#9722). The range tracks 11.x patches automatically while
        # skipping the broken 12 line. Move to ^12/@latest via #186 once the
        # upstream fix is verified.
        run: npm install -g npm@^11 && npm --version
      - name: Publish launcher to npm
        working-directory: npm
        run: |
          # Keep the package version in lockstep with the release tag.
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          # npm publish of an already-published version is a hard 403
          # (EPUBLISHCONFLICT), which still happens post-#221 on a
          # Re-run-all-jobs, or a mispointed run whose builds complete
          # before it's cancelled. Skip instead of failing a good run red.
          # PKG is read from package.json (not hardcoded) so a future
          # rename/scoping can't have this guard silently querying the
          # old name and no-op'ing a real publish.
          PKG=$(node -p "require('./package.json').name")
          if npm view "$PKG@$VERSION" version >/dev/null 2>&1; then
            echo "$PKG@$VERSION already published — nothing to do"
            exit 0
          fi
          npm publish --access public
