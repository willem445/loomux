name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
            targets: aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: --target x86_64-apple-darwin
            targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            targets: ""
          - platform: windows-latest
            args: ""
            targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.args }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Loomux ${{ github.ref_name }}"
          releaseBody: |
            Download the asset for your platform below.

            - **Windows**: `*-setup.exe` (installer) or `*.msi`
            - **macOS**: `*_aarch64.dmg` (Apple Silicon) or `*_x64.dmg` (Intel) — unsigned; if macOS reports the app as damaged, run `xattr -cr /Applications/Loomux.app`
            - **Linux**: `*.AppImage` (portable), `*.deb`, or `*.rpm`

            Or use the one-liner installers in the README.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Publish the tiny npm launcher (`npx loomux-desktop`). It just downloads
  # the release asset built above, so it can go out independently.
  # Auth is npm "trusted publishing" (OIDC): the job mints an id-token that
  # npm exchanges for publish rights — no NPM_TOKEN secret involved. Requires
  # npm >= 11.5.1 (Node 22 bundles an older one, hence the upgrade step).
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for trusted publishing
        # Pinned, not @latest: needs >= 11.5.1 for OIDC trusted publishing, but
        # 11.18.0 is the last version verified good — the next release shipped
        # without its sigstore bundle and broke `npm publish` with provenance
        # (v0.7.1, MODULE_NOT_FOUND 'sigstore'). Bump deliberately, then verify
        # a publish before trusting a newer pin.
        run: npm install -g npm@11.18.0 && npm --version
      - name: Publish launcher to npm
        working-directory: npm
        run: |
          # Keep the package version in lockstep with the release tag.
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
          npm publish --access public
