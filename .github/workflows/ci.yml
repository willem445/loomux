name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Fast mechanical backstop for release bumps (#274): the five version
      # fields (package.json, package-lock.json x2, npm/package.json,
      # tauri.conf.json, Cargo.toml, Cargo.lock) must all agree. v0.8.0
      # shipped with a stale package-lock.json (#224) because that check was
      # checklist-only — fail the build on drift instead.
      - name: Check version consistency
        run: node scripts/check-versions.js

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend (typecheck + bundle)
        run: npm run build

      # `npm run build` above is a typecheck, not a test run — the frontend suite
      # (node:test over `test/**/*.test.ts`) was never gated by CI at all, so a
      # regression in a pure module merged green as long as it still typechecked.
      # That includes the pin on the repo's OWN `.loomux/workflow.yml` (#222), which
      # is only worth having if it runs on every PR.
      - name: Test frontend
        run: npm test

      - name: Check backend
        run: cargo check --locked
        working-directory: src-tauri

      - name: Test backend
        run: cargo test --locked
        working-directory: src-tauri
